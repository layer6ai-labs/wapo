model = "HuggingFaceTB/SmolLM3-3B"

[env]
id = "vf-rag-agent"

[env.args]
train_dataset_path = "data/hotpot_train_v1.1_rl.json"
eval_dataset_path = "data/hotpot/hotpot_dev_fullwiki_v1.json"
retrieve_url = "http://localhost:8080/retrieve"

[inference]
gpus = 1

[inference.args]
enforce_eager = true

[trainer]
gpus = 1

[trainer.args]
loss_type = "wapo"
clip_eps = 9.0

use_lora = true
lora_target_modules = "all-linear"
learning_rate = 1e-5

micro_batch_size = 1
rollouts_per_example = 8
mini_batch_size = 64
batch_size = 256

max_steps = 1000
max_tokens = 1024
max_seq_len = 8192
max_grad_norm = 1.0
gradient_checkpointing = true
generation_timeout = 2400

lr_scheduler_type = "constant"
warmup_steps = 10

save_strategy = "steps"
save_steps = 50
resume_from_checkpoint = "auto"

run_name = "hotpot-qa"
output_dir = "./checkpoints/hotpot-qa"
